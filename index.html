<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CALCULATOR</title>
</head>
<body>
    <div id="calc">
    <h1>CALCULATOR</h1>
    <form action="" method=""></form>
    <input type="text" name="display" class="displayarea" id="display" readonly>
    <br>
    <input type="button" name="button" value="C" class="btn" id="special">
    <input type="button" name="button" value="&#x232B;" class="btn" id="special">
    <input type="button" name="button" value="%" class="btn" id="special">
    <input type="button" name="button" value="/" class="btn" id="special">
    <br>
    <input type="button" name="button" value="7" class="btn">
    <input type="button" name="button" value="8" class="btn">
    <input type="button" name="button" value="9" class="btn">
    <input type="button" name="button" value="*" class="btn" id="special">
    <br>
    <input type="button" name="button" value="4" class="btn">
    <input type="button" name="button" value="5" class="btn">
    <input type="button" name="button" value="6" class="btn">
    <input type="button" name="button" value="-" class="btn" id="special">
    <br>
    <input type="button" name="button" value="1"class="btn">
    <input type="button" name="button" value="2"class="btn">
    <input type="button" name="button" value="3"class="btn">
    <input type="button" name="button" value="+"class="btn" id="special">
    <br>
    <input type="button" name="button" value="0" class="btn">
    <input type="button" name="button" value="." class="btn">
    <input type="button" name="button" value="=" class="btn" id="special">
    </div>
    <script src="script.js"></script>
</body>
</html>
